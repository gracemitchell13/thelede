name: Daily Lede

on:
  schedule:
    - cron: '0 5 * * *'  # 5:00 UTC = 1am ET — runs early to account for GitHub delays
  workflow_dispatch:       # allows manual trigger from GitHub Actions tab

permissions:
  contents: write          # needed to commit the generated index.html

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check secrets are set
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "SUPABASE_URL is EMPTY"; else echo "SUPABASE_URL is SET"; fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then echo "SUPABASE_SERVICE_KEY is EMPTY"; else echo "SUPABASE_SERVICE_KEY is SET"; fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then echo "SUPABASE_ANON_KEY is EMPTY"; else echo "SUPABASE_ANON_KEY is SET"; fi
          if [ -z "$NEWSAPI_KEY" ]; then echo "NEWSAPI_KEY is EMPTY"; else echo "NEWSAPI_KEY is SET"; fi

      - name: Run fetch and generate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/fetch_and_generate.py

      - name: Inject credentials into settings.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" settings.html
          sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g" settings.html

      - name: Commit and push
        run: |
          git config user.name "The Lede Bot"
          git config user.email "actions@github.com"
          git add index.html settings.html users/
          git diff --staged --quiet || git commit -m "Daily update: $(date -u '+%Y-%m-%d')"
          git push
